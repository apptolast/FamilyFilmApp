# PR / develop pipeline for FamilyFilmApp (KMP).
#
# Three parallel jobs validate every push:
#   • ktlint runs on Ubuntu; cheap, fails fast.
#   • android-build runs on Ubuntu and builds the debug AAB + unit tests.
#   • ios-build runs on macOS-14 and assembles the Kotlin framework for the
#     iOS simulator, then drives `xcodebuild` against the Xcode project so
#     Swift Package Manager resolves all native iOS dependencies. There is
#     no CocoaPods step — SPM is the only iOS dependency manager.
#
# Secrets feed BuildKonfig and Firebase config; they're listed inline next
# to the step that consumes them. None are required for a fork build
# (every BuildKonfig field falls back to ""), so a forked PR still builds
# the debug APK — it just runs without Firebase + AdMob keys.

name: Build

on:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - develop
  workflow_dispatch:

# Cancel superseded runs on the same branch — the latest push is the only one
# whose status we care about. Tagged release runs (deploy-*.yml) live in a
# different concurrency group and are never cancelled.
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ktlint:
    name: ktlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        # AGP 9 + Kotlin 2.3 toolchain. JVM bytecode target is configured in
        # build.gradle.kts (JVM 17 for both androidTarget and main JVM).
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Run ktlint
        run: ./gradlew :composeApp:ktlintCheck --continue

  android-build:
    name: Android build & unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Decode google-services.json
        # The com.google.gms.google-services plugin requires this file during
        # processDebugGoogleServices. It's gitignored, so we restore it from
        # a base64-encoded GitHub Secret. Skipped when the secret is missing
        # (PRs from forks) — the plugin then fails clearly rather than
        # mid-build.
        if: ${{ env.HAS_FIREBASE_JSON == 'true' }}
        env:
          HAS_FIREBASE_JSON: ${{ secrets.FIREBASE_JSON != '' }}
        run: echo "${{ secrets.FIREBASE_JSON }}" | base64 -d > composeApp/google-services.json

      - name: Render local.properties
        # All BuildKonfig fields plus the AdMob `admob_app_id` resValue read
        # from local.properties. Anything missing becomes an empty string at
        # build time — the app will still compile, just with placeholders.
        run: |
          cat > local.properties <<EOF
          sdk.dir=$ANDROID_HOME
          WEB_ID_CLIENT=${{ secrets.WEB_ID_CLIENT }}
          TMDB_ACCESS_TOKEN=${{ secrets.TMDB_ACCESS_TOKEN }}
          ADMOB_APPLICATION_ID=${{ secrets.ADMOB_APPLICATION_ID }}
          ADMOB_BOTTOM_BANNER_ID=${{ secrets.ADMOB_BOTTOM_BANNER_ID }}
          ADMOB_APP_OPEN_ID=${{ secrets.ADMOB_APP_OPEN_ID }}
          ADMOB_NATIVE_HOME_ID=${{ secrets.ADMOB_NATIVE_HOME_ID }}
          ADMOB_APPLICATION_ID_IOS=${{ secrets.ADMOB_APPLICATION_ID_IOS }}
          ADMOB_BOTTOM_BANNER_ID_IOS=${{ secrets.ADMOB_BOTTOM_BANNER_ID_IOS }}
          ADMOB_APP_OPEN_ID_IOS=${{ secrets.ADMOB_APP_OPEN_ID_IOS }}
          ADMOB_NATIVE_HOME_ID_IOS=${{ secrets.ADMOB_NATIVE_HOME_ID_IOS }}
          REVENUECAT_PLAY_SDK_KEY=${{ secrets.REVENUECAT_PLAY_SDK_KEY }}
          REVENUECAT_PLAY_SDK_KEY_TEST=${{ secrets.REVENUECAT_PLAY_SDK_KEY_TEST }}
          REVENUECAT_APPSTORE_SDK_KEY=${{ secrets.REVENUECAT_APPSTORE_SDK_KEY }}
          EOF

      - name: Build composeApp (debug) + unit tests
        run: ./gradlew :composeApp:assembleDebug :composeApp:testDebugUnitTest --continue

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: composeApp-unit-test-report
          path: composeApp/build/reports/tests/testDebugUnitTest
          retention-days: 14
          if-no-files-found: ignore

  ios-build:
    name: iOS simulator build
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Decode GoogleService-Info.plist
        # Firebase config for iOS lives at iosApp/iosApp/GoogleService-Info.plist
        # (gitignored). FirebaseApp.configure() reads it at runtime; the
        # build doesn't strictly need it but Xcode warns when it's missing.
        if: ${{ env.HAS_PLIST == 'true' }}
        env:
          HAS_PLIST: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 != '' }}
        run: echo "${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 }}" | base64 -d > iosApp/iosApp/GoogleService-Info.plist

      - name: Render local.properties
        run: |
          cat > local.properties <<EOF
          sdk.dir=$ANDROID_HOME
          WEB_ID_CLIENT=${{ secrets.WEB_ID_CLIENT }}
          TMDB_ACCESS_TOKEN=${{ secrets.TMDB_ACCESS_TOKEN }}
          ADMOB_APPLICATION_ID=${{ secrets.ADMOB_APPLICATION_ID }}
          ADMOB_BOTTOM_BANNER_ID=${{ secrets.ADMOB_BOTTOM_BANNER_ID }}
          ADMOB_APP_OPEN_ID=${{ secrets.ADMOB_APP_OPEN_ID }}
          ADMOB_NATIVE_HOME_ID=${{ secrets.ADMOB_NATIVE_HOME_ID }}
          ADMOB_APPLICATION_ID_IOS=${{ secrets.ADMOB_APPLICATION_ID_IOS }}
          ADMOB_BOTTOM_BANNER_ID_IOS=${{ secrets.ADMOB_BOTTOM_BANNER_ID_IOS }}
          ADMOB_APP_OPEN_ID_IOS=${{ secrets.ADMOB_APP_OPEN_ID_IOS }}
          ADMOB_NATIVE_HOME_ID_IOS=${{ secrets.ADMOB_NATIVE_HOME_ID_IOS }}
          REVENUECAT_PLAY_SDK_KEY=${{ secrets.REVENUECAT_PLAY_SDK_KEY }}
          REVENUECAT_PLAY_SDK_KEY_TEST=${{ secrets.REVENUECAT_PLAY_SDK_KEY_TEST }}
          REVENUECAT_APPSTORE_SDK_KEY=${{ secrets.REVENUECAT_APPSTORE_SDK_KEY }}
          EOF

      - name: Link Kotlin framework for iOS simulator
        # Pre-builds the KMP framework so Kotlin compile errors fail this
        # step (clear logs) rather than getting buried in xcodebuild output.
        # Xcode's Run Script Phase re-runs `embedAndSignAppleFrameworkForXcode`
        # during build_app to do the embed step, but the heavy lifting
        # (link) is already cached at that point.
        run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64 --no-configuration-cache

      - name: Resolve Swift Package dependencies
        # Equivalent of `pod install` from the CocoaPods era. -clonedSourcePackagesDirPath
        # points at a stable cache that gradle/actions/setup-gradle does NOT
        # touch (it lives outside ~/.gradle); xcodebuild will reuse it.
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -resolvePackageDependencies \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/SourcePackages"

      - name: Build iosApp for simulator
        # Generic iOS Simulator destination so we don't have to keep this
        # workflow in sync with whichever device names the runner image
        # happens to bake in this month.
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/SourcePackages" \
            CODE_SIGNING_ALLOWED=NO \
            build
